services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vpn-backend
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - vpn-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vpn-frontend
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  vpn-data:
