services:
  app:
    image: ghcr.io/alcaprophet/vpn-subscription-manager:latest
    container_name: vpn-app
    ports:
      - "127.0.0.1:8080:8080"     # 只绑本机, 外部不可达
    volumes:
      - vpn-data:/app/data
    restart: unless-stopped
    # 可选环境变量（取消注释后 docker compose up -d 生效）:
    # environment:
    #   - LOG_LEVEL=debug           # debug | info（默认） | warn
    #   - LOG_FORMAT=json           # 不设 = 彩色控制台, json = 结构化 JSON
    #   - PORT=8080                 # 监听端口, 默认 8080

volumes:
  vpn-data:
